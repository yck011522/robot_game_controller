# Shared runtime settings for the launched processes.
# These values are not profile-selectable; profiles only choose impls,
# team activation, counts, and tuning/hardware data.

subsystems:
  haptic_io:
    fps_target: 100.0
    fps_min: 50.0
    heartbeat_age_max: 1100

  robot_io:
    fps_target: 200.0
    fps_min: 80.0
    heartbeat_age_max: 1100

  collision_workers:
    fps_target: 1000.0
    fps_min: 40.0
    heartbeat_age_max: 1100

  collision_broker:
