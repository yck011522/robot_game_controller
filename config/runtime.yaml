# Shared runtime settings for the launched processes.
# These values are not profile-selectable; profiles only choose impls,
# team activation, counts, and tuning/hardware data.

subsystems:
  haptic_io:
    fps_target: 100.0
    fps_min: 50.0
    heartbeat_age_max: 1100

  robot_io:
    fps_target: 200.0
    fps_min: 80.0
    heartbeat_age_max: 1100

  collision_workers:
    fps_target: 1000.0
    fps_min: 40.0
    heartbeat_age_max: 1100

  collision_broker:
    fps_target: 1.0
    fps_min: 0.8
    heartbeat_age_max: 1100

  bus_broker:
    fps_target: 1.0
    fps_min: 0.8
    heartbeat_age_max: 1100

  game_controller:
    fps_target: 60.0
    fps_min: 45.0
    heartbeat_age_max: 1100

  weight_sensor_io:
    fps_target: 1000.0
    fps_min: 3.0
    heartbeat_age_max: 1100

  light_column:
    fps_target: 200.0
    fps_min: 80.0
    heartbeat_age_max: 1100

  scoreboard_broadcaster:
    # Pure consumer of state.full that pushes text to the per-bucket LED panels
    # over one RS485 port. A modest rate is plenty: panels only change on stage
    # transitions and on the conclusion count-down (throttled per panel).
    fps_target: 11.0
    fps_min: 9.0
    heartbeat_age_max: 1100

  safety_barrier_controller:
    fps_target: 18.0
    fps_min: 5.0
    heartbeat_age_max: 1100
    telem_age_max: 1100

  button_controller:
    # Physical admin buttons are human-speed inputs. 40 Hz gives a 25 ms poll
    # period, enough for deliberate push buttons while leaving RS-485 headroom.
    fps_target: 40.0
    fps_min: 20.0
    heartbeat_age_max: 1100
    telem_age_max: 1100

  bucket_controller:
    fps_target: 20.0
    fps_min: 5.0
    heartbeat_age_max: 1100

  gamemaster_ui:
    fps_target: 60.0
    fps_min: 50.0
    heartbeat_age_max: 1100

  state_broadcaster:
    # Poll/wake rate only. The broadcaster is event-driven: it drains every new
    # state.full from the bus and emits one UDP datagram per state (so output
    # tracks the 60 Hz controller 1:1, never re-sending an unchanged frame).
    # Kept above 60 Hz so each new state is picked up within a few ms.
    # Session recording (when a profile enables display_broadcast_recording)
    # writes those same frames to a gzip-compressed .jsonl.gz file.
    fps_target: 120.0
    fps_min: 30.0
    heartbeat_age_max: 1100
