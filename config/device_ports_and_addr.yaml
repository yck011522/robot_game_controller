# Installation-local hardware ports and network addresses.
#
# Discovery scripts should update this file when hardware is moved to a new
# PC, USB topology, or robot network. Runtime processes read these values
# directly and fail if a required real-hardware connection is missing.

serial_ports:
  # Team haptic dial boards. Empty means "configured disconnected"; runtime
  # will not scan unrelated COM ports during launcher startup.
  haptic_a: []
  haptic_b: ["COM53", "COM52", "COM51", "COM50", "COM49", "COM48"]

  # Shared serial hardware.
  light_column_1_3: "COM45" # CH1/A
  light_column_4_5: "COM39" # CH2/B
  light_column_6_8: "COM42" # CH3/C
  safety_barrier: "COM43" # CH4/D
  weight_sensor: "COM46" # CH5/E
  bucket_motors: "COM41" # CH6/F
  score_board: "COM40" # CH7/G
  admin_buttons: "COM44" # CH8/H

serial_settings:
  haptic_dial:
    baudrate: 115200 # USB serial speed for the single-dial ESP32 haptic firmware.
  light_columns:
    baudrate: 921600 # RS485 speed validated for the LED column controllers.
    inter_command_delay_s: 0.002 # Minimum gap between LED frames; lower values can corrupt colors.
  safety_barrier:
    baudrate: 115200 # Modbus RTU speed for the 4x RS485 IO units on COM43.
    slave_addresses: [1, 2, 3, 4] # Four IO units, two discrete input channels each.
    channel_order:
      - SBarr11 # address 1, input 1
      - SBarr12 # address 1, input 2
      - SBarr21 # address 2, input 1
      - SBarr22 # address 2, input 2
      - SBarr31 # address 3, input 1
      - SBarr32 # address 3, input 2
      - SBarr41 # address 4, input 1
      - SBarr42 # address 4, input 2
    read_timeout_s: 0.070 # Per-module serial read timeout used during validation.
    inter_request_delay_s: 0.006 # Stable quiet gap: 6 ms gave 200/200 clean 8-input sweeps.

robot:
  # Team B UR10e RTDE endpoint. Port 30004 is the standard RTDE port.
  b:
    host: "192.168.0.2"
    port: 30004
