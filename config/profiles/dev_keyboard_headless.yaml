# Headless variant of dev_keyboard for automated tests.
# - haptic_io.a: sim_scripted (no pygame window required)
# - robot_io.a: sim_pybullet with tuning.robot.headless=true (DIRECT mode)

profile_name: dev_keyboard_headless
description: "P2 automated test: scripted haptic → headless sim robot, team A"

active_teams: [a]

subsystems:
  haptic_io:
    fps_target: 55.0
    fps_min: 50.0
    heartbeat_age_max: 1100
    a: sim_scripted
    b: null
  robot_io:
    fps_target: 200.0
    fps_min: 180.0
    heartbeat_age_max: 1100
    a: sim_pybullet
    b: null
  jogging_planner:
    a: in_process
    b: null

  weight_sensor_io: null
  light_column_1_3: null
  light_column_4_5: null
  light_column_6_8: null
  display_broadcaster: null
  scoreboard_broadcaster: null
  bucket_controller: null
  button_controller: null
  safety_barrier_controller: null

  collision_workers:
    count: 2
    fps_target: 1000.0
    fps_min: 800.0
    heartbeat_age_max: 1100

  collision_broker:
    fps_target: 1.0
    fps_min: 0.8
    heartbeat_age_max: 1100

  event_recorder: null
  gamemaster_ui: null
  bus_broker:
    impl: real
    fps_target: 1.0
    fps_min: 0.8
    heartbeat_age_max: 1100

tuning:
  haptic:
    gear_ratio: [10.0, 10.0, 10.0, 5.0, 5.0, 5.0]
  robot:
    q_limits_min_deg: [-180, -180, -180, -180, -180, -180]
    q_limits_max_deg: [ 180,  180,  180,  180,  180,  180]
    initial_pose_deg: [0.0, -90.0, 90.0, 0.0, 0.0, 0.0]
    headless: true
  collision:
    check_self:  true
    check_world: true
    timeout_ms:  150
    retries:     2
    bundle_size: 1
  game:
    duration_s: 240
    sum_score_rate_unit_per_s: 100
    force_stage: play

hardware: {}
