# P2 milestone profile — keyboard → sim robot → pygame dashboard.
# Single team (A), Play stage pinned. Pybullet GUI + pygame keyboard window.
# See docs/architecture/CONFIG.md §4.2 for the full schema.

profile_name: dev_keyboard
description: "P2 milestone: keyboard → sim robot, single team A"

active_teams: [a]

subsystems:
  haptic_io:
    a: sim_keyboard
    b: null

  robot_io:
    a: sim_pybullet
    b: null

  jogging_planner:
    a: in_process
    b: null

  weight_sensor_io: null
  light_column_1_3: null
  light_column_4_5: null
  light_column_6_8: null
  display_broadcaster: null
  scoreboard_broadcaster: null
  bucket_controller: null
  button_controller: null
  safety_barrier_controller: null

  collision_workers:
    count: 14

  event_recorder: null
  gamemaster_ui: null
  bus_broker: real

tuning:
  haptic:
    gear_ratio: [10.0, 10.0, 10.0, 5.0, 5.0, 5.0]
    bounds_deg_min: [-180, -180, -180, -180, -180, -180]
    bounds_deg_max: [ 180,  180,  180,  180,  180,  180]
  robot:
    max_velocity_deg_s:      [30, 30, 30, 60, 60, 60]
    max_acceleration_deg_s2: [50, 50, 50, 100, 200, 200]
    headless: false
    # Home / sim-start pose. The curated scene's `robot_configuration`
    # is zero on every joint, which sits inside the pedestal -> the
    # planner would report an in-collision state from frame 0.
    # [0, 90, 90, 0, 0, 0] is the collision-free "ready" pose we start
    # from instead. With dial=0 the jogging planner outputs exactly
    # this pose; holding a key offsets from here via the gear ratio.
    initial_pose_deg: [0.0, -90.0, 90.0, 0.0, 0.0, 0.0]
  collision:
    check_self:  true
    check_world: true
    # Hard timeout for the forward-path certify. If the worker pool
    # doesn't have ALL chunks back in this window, the planner stops
    # the robot (path_scalar=0). No last-known-good fallback. Tune
    # together with tuning.jogging.forward_bundle_size below.
    timeout_ms:  40
    retries:     2
    bundle_size: 1
  jogging:
    # Forward-path safety check (HARD gate; must complete every tick).
    n_forward_steps:     12   # how far ahead to scan, in step units
    forward_step_deg:     1.0 # joint-space spacing per step
    path_cutoff_deg:      3.0 # below this distance -> path_scalar=0
    # Bundle size: how many configs per worker request. With 12 steps:
    #   1 -> 12 tiny requests (max parallelism, max ZMQ overhead)
    #   3 -> 4 requests of 3 configs each (good fit for 4 workers)
    #   12 -> 1 monolithic request (no parallelism)
    # Tune this against worker count + observed reply latency.
    forward_bundle_size:  1
    # Proximity-slowdown probes (SOFT; round-robin, async).
    probe_half_deg:      10
    prox_floor:           0.6
    # Fallback if tuning.collision.timeout_ms is absent.
    forward_timeout_ms:  40
  game:
    force_stage: play

hardware: {}
